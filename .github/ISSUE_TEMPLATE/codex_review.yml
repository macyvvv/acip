name: Codex Review
description: Request a Codex critique or readiness review
title: "[Codex Review] "
labels: ["type:review", "status:ready", "area:codex"]
body:
  - type: textarea
    id: target
    attributes:
      label: Review Target
    validations:
      required: true
  - type: textarea
    id: required_perspectives
    attributes:
      label: Required Perspectives
      value: |
        - contradiction
        - responsibility overlap
        - undefined terms
        - testability
        - non-goal violations
        - implementation readiness
    validations:
      required: true
