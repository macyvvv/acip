name: Repository OS v1 Baseline

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-repository-os-v1-baseline:
    name: Validate Repository OS v1 Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate baseline
        run: python system/scripts/validate_repository_os_v1_baseline.py
