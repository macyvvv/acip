name: Canonical Asset Production Closure Check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-canonical-asset-production-closure:
    name: Validate Canonical Asset Production Closure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run closure validation
        run: python scripts/validate_canonical_asset_production_closure.py
