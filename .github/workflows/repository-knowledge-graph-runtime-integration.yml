name: Repository Knowledge Graph Runtime Integration

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-knowledge-graph-runtime-integration:
    name: Validate Repository Knowledge Graph Runtime Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate graph and runtime dry-run
        run: python system/scripts/validate_repository_knowledge_graph_runtime_integration.py
