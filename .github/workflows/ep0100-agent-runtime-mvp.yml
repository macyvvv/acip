name: EP0100 Agent Runtime MVP

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-ep0100:
    name: Validate EP0100 Agent Runtime MVP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate EP0100
        run: python scripts/validate_ep_0100.py
