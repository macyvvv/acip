<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kabukicho Survival Map: Smoking Areas, Toilets, Lockers &amp; Lodging</title>
<meta name="description" content="Find smoking areas, public toilets, ATMs, coin lockers, and affordable lodging in Kabukicho. Mobile-first map with verified POI details and real-time user updates.">
<link rel="stylesheet" href="style.css?v=20260717a">
<!-- Generated by build.py from .env's KABUKICHO_GMAPS_API_KEY (or the
  host's deploy-time equivalent). build.py writes a local gitignored
  copy for development and a deploy artifact copy for the public
  bundle, both loaded before the placeholder below. -->
<script src="local.config.js"></script>
<script>
  /* GA placeholder -- ID injected via config, never hardcoded. Empty string
     means analytics stays fully disabled until an operator sets a real ID. */
  window.KABUKICHO_GA_ID = window.KABUKICHO_GA_ID || "";
  /* Google Maps JavaScript API key -- injected via config, never hardcoded.
     Empty string means the map pane shows a setup notice instead of a map
     until an operator sets a real, referrer-restricted key. If
     local.config.js (above) loaded successfully, it already set this and
     the `|| ""` fallback below preserves that value. */
  window.KABUKICHO_GMAPS_API_KEY = window.KABUKICHO_GMAPS_API_KEY || "";
</script>
<!-- SSG:JSONLD -- build.py replaces this with a JSON-LD <script> block
     generated from platform/system/runtime/data/kabukicho/*.json. Do not hand-edit;
     it is regenerated on every build.py run. -->
<!-- SSG:JSONLD -->
</head>
<body>
  <header class="app-header">
    <div class="app-header-row">
      <div class="app-header-copy">
        <h1>歌舞伎町サバイバルマップ</h1>
        <p class="app-subtitle">近くで今使える場所を、状況別にすばやく探す</p>
      </div>
      <button id="controls-toggle" class="controls-toggle" type="button" aria-controls="control-panel" aria-expanded="false">
        <span class="controls-toggle-icon">☰</span>
        <span class="controls-toggle-label">条件</span>
      </button>
    </div>
  </header>

  <div class="app-layout">
    <aside class="left-pane">
      <div id="controls-backdrop" class="controls-backdrop" hidden></div>

      <div class="left-pane-controls" id="control-panel" aria-label="検索条件パネル">
        <div class="controls-shell">
          <div class="controls-panel-head">
            <div>
              <span class="controls-panel-kicker">QUICK CONTROLS</span>
              <strong class="controls-panel-title">状況と条件を切り替える</strong>
            </div>
            <button id="controls-close" class="controls-close" type="button" aria-label="条件パネルを閉じる">閉じる</button>
          </div>

          <div class="controls-panel-overlay" id="controls-panel-overlay" aria-label="検索条件オーバーレイ">
            <section id="mode-bar" class="mode-bar" aria-label="状況モード">
              <!-- populated by app.js -->
            </section>

            <nav class="bottom-nav" id="bottom-nav" aria-label="カテゴリ">
              <!-- populated by app.js -->
            </nav>

            <div id="filter-bar" class="filter-bar" aria-label="絞り込み">
              <!-- populated by app.js, one row of toggleable tag chips per category -->
            </div>

            <div id="current-context-overlay" class="current-context current-context-overlay" aria-live="polite"></div>

            <div class="filter-actions">
              <button id="filter-apply" class="filter-apply" type="button">この条件で検索</button>
            </div>
          </div>

        </div>
      </div>

      <div class="left-pane-scroll">
        <section class="results-shell-head" aria-label="現在の表示条件">
          <div id="current-context" class="current-context" aria-live="polite"></div>
          <button id="reopen-controls" class="reopen-controls" type="button">条件を変更</button>
        </section>

        <main id="poi-list" class="poi-list" aria-live="polite">
          <!-- SSG:POI_CONTENT -- build.py replaces this with a static render of
               every category's POIs (all six, not just the default category),
               from platform/system/runtime/data/kabukicho/*.json. This is what a crawler
               that does not execute JavaScript (most AI answer-engine bots) will
               see; app.js's renderList() fully replaces #poi-list's innerHTML on
               DOMContentLoaded, so a JS-capable browser never shows this content
               for more than an instant. Do not hand-edit; regenerated every
               build.py run. -->
          <p class="empty-state">カテゴリを選択して、歌舞伎町の施設を探してください。</p>
        </main>

        <aside class="monetization-slot monetization-slot-secondary" id="monetization-slot-secondary" aria-label="関連サービス枠">
          <span class="monetization-slot-label">RECOMMENDED</span>
          <div class="monetization-slot-body">
            <strong>関連サービス・提携枠</strong>
            <p>一覧を見終えたあとに比較しやすい送客先や、深夜向けの提携先をここに掲載します。</p>
          </div>
        </aside>

        <section id="faq-section" class="faq-section" aria-label="よくある質問">
          <!-- SSG:FAQ_CONTENT -- build.py replaces this with static FAQ content +
               FAQPage JSON-LD, generated from a small fixed Q&A list in build.py.
               Deliberately OUTSIDE #poi-list so app.js's renderList() (which
               replaces #poi-list's innerHTML on every category switch) never
               wipes it out -- this content should persist for real visitors too,
               not just crawlers. Do not hand-edit; regenerated every build.py
               run. -->
          <!-- SSG:FAQ_CONTENT -->
        </section>
      </div>

      <aside class="monetization-slot monetization-slot-primary" id="monetization-slot-primary" aria-label="常設関連サービス枠">
        <span class="monetization-slot-label">RECOMMENDED</span>
        <div class="monetization-slot-body">
          <strong>常設の関連サービス・提携枠</strong>
          <p>条件を切り替えても下部に表示し続ける、比較しやすい常設の送客枠です。</p>
        </div>
      </aside>
    </aside>

    <section id="map-pane" class="map-pane">
      <div id="map" class="map-canvas"></div>
      <div id="map-fallback" class="map-fallback" aria-live="polite"></div>
    </section>
  </div>

  <script src="dom_escape.js"></script>
  <script src="app.js?v=20260717a"></script>
  <script>
    if (window.KABUKICHO_GA_ID) {
      var gaScript = document.createElement("script");
      gaScript.async = true;
      gaScript.src = "https://www.googletagmanager.com/gtag/js?id=" + window.KABUKICHO_GA_ID;
      document.head.appendChild(gaScript);
      window.dataLayer = window.dataLayer || [];
      function gtag() { window.dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", window.KABUKICHO_GA_ID);
    }
  </script>
</body>
</html>
