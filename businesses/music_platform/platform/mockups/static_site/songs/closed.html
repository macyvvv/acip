<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Song entry closed</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="pill" href="./index.html">← Songs</a>
      <a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a>
    </header>
    <section class="page stack">
      <div class="hero">
        <div class="eyebrow">曲締切後</div>
        <h1>この会の曲への参加登録は締切済み。</h1>
        <p class="lead">登録済みの担当曲はMyページで確認できる。新しい曲への参加登録は受け付けない。</p>
      </div>
      <article class="next-action compact">
        <div class="section-label">次にやること</div>
        <h2>登録済みの担当曲を確認する</h2>
        <p>変更や遅刻がある場合は緊急連絡へ進む。</p>
        <div class="actions">
          <a class="action accent" href="../participant/my.html">Myページへ</a>
          <a class="action secondary" href="../events/index.html">別の会を探す</a>
        </div>
      </article>
      <article class="card state-panel">
        <div class="section-label">現在の状態</div>
        <ul class="state-list">
          <li><b>曲締切</b><span>closed</span></li>
          <li><b>新規登録</b><span>不可</span></li>
          <li><b>許可導線</b><span>登録済み担当曲の確認のみ</span></li>
        </ul>
      </article>
    </section>
  </main>
  <script src="../assets/app.js"></script>
</body>
</html>
