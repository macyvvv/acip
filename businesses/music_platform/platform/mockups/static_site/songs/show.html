<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Song detail</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="pill" href="./index.html">← Songs</a>
      <a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a>
    </header>
    <section class="page stack">
      <div class="hero">
        <div class="eyebrow">Song detail</div>
        <h1>透明少女</h1>
        <p class="lead">あとGtが入れば必須枠充足。曲品質ではなく、枠と本人意思で成立へ進む。</p>
        <div class="hero-tools">
          <button class="help" type="button" aria-expanded="false">記号の意味<span class="help-tip"><b>補足</b>■は充足済み、△は空き。必須/任意は文字ラベルで判断する。</span></button>
        </div>
      </div>
      <article class="next-action compact">
        <div class="section-label">次にやること</div>
        <h2>Gtの空き枠に入るか決める</h2>
        <p>入る場合だけ曲への参加登録確認へ進む。</p>
      </article>
      <div class="page-layout">
        <article class="card">
          <div class="section-label">保存されるスロット</div>
          <h2>スロット</h2>
          <div class="slot-row"><span class="slot-mark">■</span><div>Vo 必須<br><small>山田 / 公開プロフィールあり</small></div><strong>1/1</strong></div>
          <div class="slot-row"><span class="slot-mark open">△</span><div>Gt 必須<br><small>あなたの参加可能パートに一致</small></div><strong>0/1</strong></div>
          <div class="slot-row"><span class="slot-mark">■</span><div>Ba 必須<br><small>佐藤</small></div><strong>1/1</strong></div>
          <div class="actions">
            <a class="action accent" href="./entry.html">Gtで曲へ参加する</a>
            <a class="action secondary" href="../participant/my.html">自分の担当を見る</a>
          </div>
        </article>
        <aside class="stack">
          <div class="state-panel">
            <div class="section-label">現在の状態</div>
            <ul class="state-list">
              <li><b>曲</b><span>未成立</span></li>
              <li><b>必須枠</b><span>あとGt 1枠</span></li>
              <li><b>受付</b><span>曲締切前</span></li>
            </ul>
          </div>
        </aside>
      </div>
    </section>
  </main>
  <script src="../assets/app.js"></script>
</body>
</html>
