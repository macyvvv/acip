<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deadline closed</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="pill" href="./index.html">← Events</a>
      <a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a>
    </header>
    <section class="page stack">
      <div class="hero">
        <div class="eyebrow">Closed gate</div>
        <h1>この会の演奏参加登録は締切済み。</h1>
        <p class="lead">飛び入り演奏参加は扱わない。登録済み参加者はマイページまたはRun画面へ進む。</p>
        <div class="actions">
          <a class="action" href="../participant/my.html">登録済みの予定を見る</a>
          <a class="action secondary" href="./index.html">別の会を探す</a>
        </div>
      </div>
      <article class="card state-panel">
        <div class="section-label">現在の状態</div>
        <ul class="state-list">
          <li><b>参加登録</b><span>closed</span></li>
          <li><b>新規演奏参加</b><span>不可</span></li>
          <li><b>許可導線</b><span>登録済み参加者のRunのみ</span></li>
        </ul>
      </article>
      <article class="next-action compact">
        <div class="section-label">次にやること</div>
        <h2>登録済みならMyページ、未登録なら別の会へ</h2>
        <p>締切後の新規演奏参加は受け付けない。</p>
      </article>
    </section>
  </main>
</body>
</html>
