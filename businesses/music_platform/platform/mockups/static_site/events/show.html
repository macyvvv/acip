<body>
  <main class="shell">
    <header class="topbar">
      <a class="brand" href="../index.html">music platform<small>music session</small></a>
      <a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a>
    </header>
    <section class="page">
      <div class="layout">
        <div class="hero">
          <div class="eyebrow">受付中</div>
          <h1>8/24 渋谷アニソンセッション</h1>
          <div class="deadline">参加締切 8/10 23:59</div>
          <div class="actions">
            <a class="action accent" href="../auth/participant.html">参加登録</a>
            <a class="action secondary" href="../songs/index.html">曲を見る</a>
          </div>
        </div>
        <aside class="rail">
          <div class="section-label">状態</div>
          <ul class="state-list">
            <li><b>成立</b><span>12 / 18曲</span></li>
            <li><b>不足</b><span>Gt 4 / Ba 3 / Key 2</span></li>
            <li><b>あなた</b><span>ログイン前</span></li>
            <li><b>場所</b><span>渋谷 / 15:40受付</span></li>
          </ul>
        </aside>
      </div>
      <div class="grid two">
        <article class="card">
          <h2>締切</h2>
          <ul class="state-list">
            <li><b>参加</b><span>8/10 23:59</span></li>
            <li><b>曲</b><span>8/13 23:59</span></li>
            <li><b>推薦</b><span>8/14 12:00</span></li>
          </ul>
        </article>
        <article class="card">
          <h2>空きパート</h2>
          <div class="part-grid">
            <div class="part">Vo <span class="mark filled">■</span></div>
            <div class="part">Gt <span class="mark open">△</span></div>
            <div class="part">Ba <span class="mark open">△</span></div>
            <div class="part">Dr <span class="mark filled">■</span></div>
          </div>
        </article>
      </div>
    </section>
