<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>推薦</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="brand" href="../index.html">music platform<small>music session</small></a>
      <a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a>
    </header>
    <section class="page">
      <div class="layout">
        <div class="hero">
          <div class="eyebrow">未返信</div>
          <h1>Butter-Fly / Ba</h1>
          <div class="deadline">返答期限 8/14 12:00</div>
          <div class="actions">
            <a class="action accent" data-modal="accept" href="#">入る</a>
            <a class="action secondary" data-modal="decline" href="#">見送る</a>
          </div>
        </div>
        <aside class="rail">
          <div class="section-label">あなた</div>
          <ul class="state-list">
            <li><b>できる</b><span>Ba</span></li>
            <li><b>担当</b><span>1 / 4曲以上</span></li>
            <li><b>この曲</b><span>未参加</span></li>
          </ul>
        </aside>
      </div>
    </section>
    <div class="modal" id="accept">
      <div class="modal-card">
        <h2>Butter-Fly / Ba</h2>
        <ul class="state-list">
          <li><b>担当</b><span>確定後 2 / 4曲以上</span></li>
          <li><b>残り</b><span>Key</span></li>
        </ul>
        <div class="actions">
          <a class="action accent" href="my.html">確定</a>
          <button class="action ghost" data-close-modal type="button">戻る</button>
        </div>
      </div>
    </div>
    <div class="modal" id="decline">
      <div class="modal-card">
        <h2>見送る</h2>
        <form class="form-grid">
          <label>理由
            <select>
              <option>今回は増やさない</option>
              <option>練習時間が足りない</option>
              <option>当日負荷を増やしたくない</option>
              <option>その他</option>
            </select>
          </label>
          <div class="actions">
            <a class="action secondary" data-toast="保存しました" href="my.html">保存</a>
            <button class="action ghost" data-close-modal type="button">戻る</button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="../index.html">Home</a>
    <a href="../events/index.html">Events</a>
    <a href="../songs/index.html">Songs</a>
    <a class="active" href="../participant/my.html">My</a>
    <a href="../emergency/index.html">Emergency</a>
  </nav>
  <script src="../assets/app.js"></script>
</body>
</html>
