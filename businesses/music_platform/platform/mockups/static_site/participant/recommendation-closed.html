<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recommendation closed</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="pill" href="./my.html">← My</a>
      <a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a>
    </header>
    <section class="page stack">
      <div class="hero">
        <div class="eyebrow">推薦締切後</div>
        <h1>おすすめ参加候補の受付は終了。</h1>
        <p class="lead">推薦通知締切を過ぎたため、新しいおすすめ参加候補は送られない。</p>
        <div class="assurance">辞退済み・未承諾の推薦は能力評価には使わない。</div>
      </div>
      <article class="next-action compact">
        <div class="section-label">次にやること</div>
        <h2>現在の担当曲だけ確認する</h2>
        <p>当日準備、集合、変更連絡へ進む。</p>
        <div class="actions">
          <a class="action accent" href="./my.html">Myページへ</a>
          <a class="action secondary" href="./run.html">当日チェックへ</a>
        </div>
      </article>
      <article class="card state-panel">
        <div class="section-label">現在の状態</div>
        <ul class="state-list">
          <li><b>推薦締切</b><span>closed</span></li>
          <li><b>新規通知</b><span>停止</span></li>
          <li><b>承諾待ち</b><span>期限切れとして記録</span></li>
        </ul>
      </article>
    </section>
  </main>
  <script src="../assets/app.js"></script>
</body>
</html>
