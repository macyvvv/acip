<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>参加登録</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="brand" href="../index.html">music platform<small>music session</small></a>
      <a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a>
    </header>
    <section class="page">
      <div class="layout">
        <div class="hero">
          <div class="eyebrow">未登録</div>
          <h1>参加登録</h1>
          <div class="deadline">参加締切 8/10 23:59</div>
        </div>
        <aside class="rail">
          <div class="section-label">登録後</div>
          <ul class="state-list">
            <li><b>会</b><span>参加済み</span></li>
            <li><b>曲</b><span>選択可</span></li>
            <li><b>推薦</b><span>条件一致のみ届く</span></li>
          </ul>
        </aside>
      </div>
      <form class="card form-grid">
        <label>メインパート <span class="req">必須</span>
          <select>
            <option>ギター</option><option>ボーカル</option><option>ベース</option><option>ドラム</option><option>キーボード/ピアノ</option><option>サックス</option><option>トランペット</option><option>その他</option>
          </select>
        </label>
        <label>できるパート <span class="req optional">任意</span>
          <input value="ギター, コーラス, ベース">
        </label>
        <label>参加時間 <span class="req">必須</span>
          <select><option>終日</option><option>前半のみ</option><option>後半のみ</option></select>
        </label>
        <label>推薦通知 <span class="req">必須</span>
          <select><option>受け取る</option><option>受け取らない</option></select>
        </label>
        <label>担当上限 <span class="req optional">任意</span>
          <select><option>4曲以上</option><option>3曲まで</option><option>2曲まで</option><option>1曲だけ</option></select>
        </label>
        <div class="actions"><a class="action accent" href="../songs/index.html">保存して曲へ</a></div>
      </form>
    </section>
  </main>
  <nav class="bottom-nav">
    <a href="../index.html">Home</a>
    <a href="../events/index.html">Events</a>
    <a href="../songs/index.html">Songs</a>
    <a class="active" href="../participant/my.html">My</a>
    <a href="../emergency/index.html">Emergency</a>
  </nav>
  <script src="../assets/app.js"></script>
</body>
</html>
