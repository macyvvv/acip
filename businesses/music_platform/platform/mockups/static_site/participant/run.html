<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Run</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="pill" href="./my.html">← My</a>
      <a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a>
    </header>
    <section class="page stack">
      <div class="hero">
        <div class="eyebrow">Registered participant run</div>
        <h1>登録済み参加者の当日確認。</h1>
        <p class="lead">ここは飛び入り受付ではない。到着、持ち物、変更連絡だけを扱う。</p>
        <div class="hero-tools">
          <button class="help" type="button" aria-expanded="false">Runの範囲<span class="help-tip"><b>補足</b>Run画面は登録済み参加者の当日運営用。新規参加や飛び入り受付ではない。</span></button>
        </div>
      </div>
      <article class="card state-panel">
        <div class="section-label">現在の状態</div>
        <h2>次の1アクション</h2>
        <p>集合 12:30 / 新宿Studio A / 受付で名前を伝える</p>
        <div class="actions"><a class="action danger" href="../emergency/index.html">遅刻・欠席・変更を連絡する</a></div>
      </article>
      <article class="next-action compact">
        <div class="section-label">次にやること</div>
        <h2>集合場所と到着時間を確認する</h2>
        <p>遅刻・欠席・変更がある場合だけ緊急連絡へ進む。</p>
      </article>
    </section>
  </main>
  <script src="../assets/app.js"></script>
