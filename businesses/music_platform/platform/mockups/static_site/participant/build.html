<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Participant Build</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="brand" href="../index.html">music platform<small>music session</small></a>
      <a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a>
    </header>
    <section class="page">
      <div class="layout">
        <div class="hero">
          <div class="eyebrow">追加参加の判断</div>
          <h1>追加で入るか、断るか</h1>
          <div class="actions">
            <a class="action accent" href="recommendation.html">推薦に返答する</a>
            <a class="action secondary" href="../songs/index.html">空き曲を見る</a>
          </div>
        </div>
        <aside class="rail">
          <div class="section-label">自分の負荷</div>
          <ul class="state-list">
            <li><b>担当</b><span>1 / 4曲以上</span></li>
            <li><b>推薦</b><span>1件。承諾待ち</span></li>
            <li><b>通知</b><span>条件一致のみ</span></li>
          </ul>
        </aside>
      </div>
      <article class="card">
        <h2>判断材料</h2>
        <table class="mini-table">
          <tr><th>曲</th><th>不足</th><th>根拠</th><th>判断</th></tr>
          <tr><td>Butter-Fly</td><td>Ba</td><td>未参加 / パート一致</td><td><a href="recommendation.html">返答</a></td></tr>
          <tr><td>星間飛行</td><td>Gt</td><td>参加済み</td><td>除外</td></tr>
        </table>
      </article>
    </section>
  </main>
  <nav class="bottom-nav">
    <a href="../index.html">Home</a>
    <a href="../events/index.html">Events</a>
    <a href="../songs/index.html">Songs</a>
    <a class="active" href="../participant/my.html">My</a>
    <a href="../emergency/index.html">Emergency</a>
  </nav>
  <script src="../assets/app.js"></script>
</body>
</html>
