<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Platform admin</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="pill" href="../index.html">← Home</a>
      <span class="pill">Platform操作中の緊急連絡は対象イベント画面から行う</span>
    </header>
    <section class="page stack">
      <div class="hero">
        <div class="eyebrow">Platform Super User</div>
        <h1>通知エンジンの特権入口。</h1>
        <p class="lead">主催者に渡さない操作を、プラットフォーマーだけが監査つきで扱う。</p>
        <div class="actions"><a class="action accent" href="./notification-gate.html">Notification Gateへ</a></div>
      </div>
      <article class="card record-panel">
        <div class="section-label">Platformの責務</div>
        <ul class="record-list">
          <li><b>dry_run</b><span>送信前検証</span></li>
          <li><b>engine</b><span>実行切替 / 停止判断</span></li>
          <li><b>audit</b><span>誤通知対応 / 監査確認</span></li>
        </ul>
      </article>
      <article class="next-action compact">
        <div class="section-label">次にやること</div>
        <h2>Notification Gateでdry_runを確認する</h2>
        <p>送信実行や停止判断はPlatform Super Userだけが扱う。</p>
      </article>
    </section>
  </main>
</body>
</html>
