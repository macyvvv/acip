<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>推薦通知ゲート</title><link rel="stylesheet" href="../assets/styles.css"></head><body><main class="shell"><header class="topbar"><a class="brand" href="../index.html">music platform<small>music session</small></a><a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a></header><section class="page"><div class="layout"><div class="hero"><div class="eyebrow">管理者専用</div><h1>推薦通知ゲート</h1><p class="lead">推薦候補、除外理由、送信上限、停止状態を確認する運営者用画面。通常の主催者画面には表示されません。</p><div class="actions"><a class="action accent" data-toast="推薦候補の検証結果を更新しました。" href="#">候補を再計算</a><a class="action danger" data-toast="推薦通知を停止しました。" href="#">推薦通知を停止</a></div></div><aside class="rail"><div class="section-label">監査</div><ul class="state-list"><li><b>候補</b><span>27件</span></li><li><b>除外</b><span>18件</span></li><li><b>送信上限</b><span>1人2件まで</span></li><li><b>誤通知リスク</b><span>低 / 要確認2</span></li></ul></aside></div><div class="grid two"><article class="card"><h2>送信候補</h2><p>成立まで近い曲、成立曲数が少ない参加者、締切前の残り日数を優先して候補化。</p></article><article class="card"><h2>除外理由</h2><p>同じ曲に参加済み、担当上限到達、通知拒否、時間不一致、既に辞退済みの参加者を除外。</p></article></div></section></main><nav class="bottom-nav"><a class="" href="../index.html">Home</a><a class="" href="../events/index.html">Events</a><a class="" href="../songs/index.html">Songs</a><a class="" href="../participant/my.html">My</a><a class="" href="../emergency/index.html">Emergency</a></nav><script src="../assets/app.js"></script></body></html>
