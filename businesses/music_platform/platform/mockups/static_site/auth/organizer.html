<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>主催ログイン</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="brand" href="../index.html">music platform<small>music session</small></a>
      <a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a>
    </header>
    <section class="page">
      <div class="layout">
        <div class="hero">
          <div class="eyebrow">主催 / 必須</div>
          <h1>ログイン</h1>
          <div class="social-grid">
            <a class="social google" href="#profile">Googleで続ける</a>
            <a class="social twitter" href="#profile">Xで続ける</a>
            <a class="social instagram" href="#profile">Instagramで続ける</a>
            <a class="social tiktok" href="#profile">TikTokで続ける</a>
          </div>
        </div>
        <aside class="rail">
          <div class="section-label">次</div>
          <ul class="state-list">
            <li><b>必須</b><span>ソーシャルログイン</span></li>
            <li><b>任意</b><span>プロフィール</span></li>
            <li><b>次</b><span>開催設定</span></li>
          </ul>
        </aside>
      </div>
      <form class="card form-grid" id="profile">
        <div class="section-label">プロフィール</div>
        <label>表示名 <span class="req optional">任意</span><input value="ariel"></label>
        <label>活動エリア <span class="req optional">任意</span><input placeholder="例: 東京, 神奈川"></label>
        <label>ジャンル <span class="req optional">任意</span><input placeholder="例: アニソン, ロック"></label>
        <label>連絡表示名 <span class="req optional">任意</span><input placeholder="例: 主催 ariel"></label>
        <div class="actions">
          <a class="action accent" href="../organizer/setup.html">開催設定へ</a>
          <a class="action ghost" href="../index.html">戻る</a>
        </div>
      </form>
    </section>
  </main>
  <script src="../assets/app.js"></script>
</body>
</html>
