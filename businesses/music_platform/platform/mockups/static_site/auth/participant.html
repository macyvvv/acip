<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>参加ログイン</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="brand" href="../index.html">music platform<small>music session</small></a>
      <a class="pill emergency-pill" href="../emergency/index.html">緊急連絡</a>
    </header>
    <section class="page">
      <div class="layout">
        <div class="hero">
          <div class="eyebrow">参加 / 必須</div>
          <h1>ログイン</h1>
          <div class="social-grid">
            <a class="social google" href="#profile">Googleで続ける</a>
            <a class="social twitter" href="#profile">Xで続ける</a>
            <a class="social instagram" href="#profile">Instagramで続ける</a>
            <a class="social tiktok" href="#profile">TikTokで続ける</a>
          </div>
        </div>
        <aside class="rail">
          <div class="section-label">次</div>
          <ul class="state-list">
            <li><b>必須</b><span>ソーシャルログイン</span></li>
            <li><b>任意</b><span>プロフィール</span></li>
            <li><b>未設定</b><span>推薦なし</span></li>
            <li><b>次</b><span>参加登録</span></li>
          </ul>
        </aside>
      </div>
      <form class="card form-grid" id="profile">
        <div class="section-label">プロフィール</div>
        <label>表示名 <span class="req optional">任意</span><input value="ariel"></label>
        <label>メインパート <span class="req optional">任意</span>
          <select>
            <option>未設定</option><option>ギター</option><option>ボーカル</option><option>ベース</option><option>ドラム</option><option>キーボード/ピアノ</option><option>サックス</option><option>トランペット</option><option>その他</option>
          </select>
        </label>
        <label>できるパート <span class="req optional">任意</span><input placeholder="例: ギター, コーラス, ベース"></label>
        <label>活動エリア <span class="req optional">任意</span><input placeholder="例: 東京, 神奈川"></label>
        <div class="actions">
          <a class="action accent" href="../participant/entry.html">参加登録へ</a>
          <a class="action ghost" href="../events/index.html">あとで設定</a>
        </div>
      </form>
    </section>
  </main>
  <script src="../assets/app.js"></script>
</body>
</html>
