<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emergency</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar"><a class="pill" href="../participant/my.html">← Back</a></header>
    <section class="page stack">
      <div class="hero">
        <div class="eyebrow">Emergency first</div>
        <h1>連絡前に影響を見る。</h1>
        <p class="lead">欠席や遅刻を隠さず送れるようにする。ただし影響を不可視化しない。</p>
        <div class="assurance">早い連絡ほど復旧しやすい。責めるためではなく、代替と通知を間に合わせるための確認。</div>
        <div class="hero-tools">
          <button class="help" type="button" aria-expanded="false">影響確認とは<span class="help-tip"><b>補足</b>連絡はしやすくする。ただし離脱の外部影響を不可視化しない。</span></button>
        </div>
      </div>
      <div class="page-layout">
        <article class="card state-panel">
          <div class="section-label">影響状態</div>
          <ul class="state-list">
            <li><b>曲</b><span>透明少女が未成立に戻る</span></li>
            <li><b>影響</b><span>メンバー4名 / 代替候補2名</span></li>
            <li><b>通知</b><span>主催者と該当メンバーへ送信</span></li>
          </ul>
          <div class="actions">
            <a class="action danger" href="../timeline/index.html">影響を確認して送信状態へ</a>
            <a class="action secondary" href="../participant/run.html">戻る</a>
          </div>
        </article>
      </div>
      <article class="next-action compact">
        <div class="section-label">次にやること</div>
        <h2>影響を確認して送信する</h2>
        <p>送信後、Timelineに連絡済み状態が残る。</p>
      </article>
    </section>
  </main>
  <script src="../assets/app.js"></script>
</body>
</html>
