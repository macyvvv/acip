# Cloudflare Workers/Pages config for the Kabukicho Survival Map
# (businesses/kabukicho_survival_map/app). This is a monorepo (acip) with
# many unrelated products under it -- this file only deploys that one
# product's static bundle, generated by
# businesses/kabukicho_survival_map/app/build.py (run as the dashboard's
# "Build command" before `wrangler deploy` runs). If a second product ever
# needs its own Cloudflare deployment, it needs its own wrangler.toml (with
# its own name/assets.directory), not a second block here.
#
# Required environment variables (set in the Cloudflare dashboard's Build
# variables, never committed): KABUKICHO_GMAPS_API_KEY (referrer-restricted
# Google Maps JS API key), KABUKICHO_GA_ID, KABUKICHO_ADSENSE_CLIENT,
# KABUKICHO_SITE_URL (this site's own final URL -- activates
# sitemap.xml/canonical generation in build.py).
name = "kabukichosurvivalmap"
compatibility_date = "2026-07-17"

[assets]
directory = "platform/web/public/kabukicho_survival_map"
