<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kabukicho Survival Map: Smoking Areas, Toilets, Lockers &amp; Lodging</title>
<meta name="description" content="Find smoking areas, public toilets, ATMs, coin lockers, and affordable lodging in Kabukicho. Mobile-first map with verified POI details and real-time user updates.">
<link rel="stylesheet" href="style.css">
<!-- Local-dev-only: gitignored, generated by build.py from .env's
     KABUKICHO_GMAPS_API_KEY (see architecture.md). Absent by default --
     a missing script src fails silently in the browser, so this is safe
     to reference even when the file doesn't exist (every environment
     except a developer's own machine after running build.py with a real
     key set). Never present in the committed web/public/kabukicho/
     bundle; a real deploy needs its own separate key-injection step. -->
<script src="local.config.js"></script>
<script>
  /* GA placeholder -- ID injected via config, never hardcoded. Empty string
     means analytics stays fully disabled until an operator sets a real ID. */
  window.KABUKICHO_GA_ID = window.KABUKICHO_GA_ID || "";
  /* Google Maps JavaScript API key -- injected via config, never hardcoded.
     Empty string means the map pane shows a setup notice instead of a map
     until an operator sets a real, referrer-restricted key. If
     local.config.js (above) loaded successfully, it already set this and
     the `|| ""` fallback below preserves that value. */
  window.KABUKICHO_GMAPS_API_KEY = window.KABUKICHO_GMAPS_API_KEY || "";
</script>
</head>
<body>
  <header class="app-header">
    <h1>歌舞伎町サバイバルマップ</h1>
  </header>

  <section id="map-pane" class="map-pane">
    <div id="map" class="map-canvas"></div>
  </section>

  <div id="filter-bar" class="filter-bar" aria-label="絞り込み">
    <!-- populated by app.js, one row of toggleable tag chips per category -->
  </div>

  <main id="poi-list" class="poi-list" aria-live="polite">
    <p class="empty-state">カテゴリを選択して、歌舞伎町の施設を探してください。</p>
  </main>

  <nav class="bottom-nav" id="bottom-nav" aria-label="カテゴリ">
    <!-- populated by app.js -->
  </nav>

  <script src="app.js"></script>
  <script>
    if (window.KABUKICHO_GA_ID) {
      var gaScript = document.createElement("script");
      gaScript.async = true;
      gaScript.src = "https://www.googletagmanager.com/gtag/js?id=" + window.KABUKICHO_GA_ID;
      document.head.appendChild(gaScript);
      window.dataLayer = window.dataLayer || [];
      function gtag() { window.dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", window.KABUKICHO_GA_ID);
    }
  </script>
</body>
</html>
