workers:
  Codex:
    capability:
      - repository_implementation
      - validation_execution
      - code_refactoring
    allowed_actions:
      - implement
      - refactor
      - test
      - validate
    prohibited_actions:
      - approve
      - deploy
      - push_directly_to_main
    validation_responsibility:
      - run_repository_validation
      - report_validation_results
    output_contract: orchestrator/output_contract.py
  ChatGPT:
    capability:
      - architecture_review
      - prompt_generation
      - review_package_authoring
    allowed_actions:
      - design
      - review
      - specify
    prohibited_actions:
      - execute_code
      - mutate_repository
    validation_responsibility:
      - define_validation_scope
      - review_validation_results
    output_contract: orchestrator/output_contract.py
  Human:
    capability:
      - approval
      - strategy
      - capital_allocation
    allowed_actions:
      - approve
      - reject
      - reprioritize
    prohibited_actions:
      - implementation
      - automated_execution
    validation_responsibility:
      - approve_validation_scope
      - accept_risk
    output_contract: orchestrator/output_contract.py
  GitHub Actions:
    capability:
      - ci_execution
      - repository_validation
    allowed_actions:
      - run_workflow
      - collect_logs
      - publish_artifacts
    prohibited_actions:
      - edit_code
      - bypass_review
    validation_responsibility:
      - execute_validate_all
      - persist_validation_artifacts
    output_contract: orchestrator/output_contract.py
